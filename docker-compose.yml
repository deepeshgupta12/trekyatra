services:
  postgres:
    image: postgres:16-alpine
    container_name: trekyatra-postgres
    environment:
      POSTGRES_DB: trekyatra
      POSTGRES_USER: trekyatra
      POSTGRES_PASSWORD: trekyatra
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trekyatra -d trekyatra"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trekyatra-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5