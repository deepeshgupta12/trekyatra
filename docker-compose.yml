services:
  postgres:
    image: postgres:16-alpine
    container_name: trekyatra-postgres
    environment:
      POSTGRES_DB: trekyatra
      POSTGRES_USER: trekyatra
      POSTGRES_PASSWORD: trekyatra
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trekyatra -d trekyatra"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trekyatra-redis
    ports:
      - "6380:6379"
    volumes:
      - ./redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: services/api
    container_name: trekyatra-worker
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    profiles: ["worker"]

  beat:
    build:
      context: services/api
    container_name: trekyatra-beat
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_SERVER: postgres
      POSTGRES_PORT: 5432
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["worker"]